; =============================================================================
; Asterisk 20 Dialplan - Call Center System
; Recording via MixMonitor + Webhook to Laravel API
; =============================================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
RECORDING_DIR=/var/spool/asterisk/recording
LARAVEL_API=http://127.0.0.1:8000/api
RECORD_FORMAT=wav

; =============================================================================
; Call Center Context - All agent calls go through here
; =============================================================================
[call-center]

; --- Internal calls between agents (1001-1025) ---
exten => _100[1-9],1,NoOp(Internal call to agent extension ${EXTEN})
 same => n,Set(AGENT_NUM=$[${EXTEN} - 1000])
 same => n,Set(AGENT_NAME=agent${AGENT_NUM})
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(name)}-to-${AGENT_NAME}-${UNIQUEID}.${RECORD_FORMAT})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${AGENT_NAME},30,tTkK)
 same => n,StopMixMonitor()
 same => n,Set(CALL_DURATION=${CDR(billsec)})
 same => n,Set(CALL_STATUS=${DIALSTATUS})
 same => n,System(curl -s -X POST ${LARAVEL_API}/webhook/call-ended -H "Content-Type: application/json" -d '{"recording_file":"${RECORDING_FILE}","caller":"${CALLERID(name)}","callee":"${AGENT_NAME}","duration":"${CALL_DURATION}","status":"${CALL_STATUS}","uniqueid":"${UNIQUEID}"}' &)
 same => n,Hangup()

exten => _101[0-9],1,NoOp(Internal call to agent extension ${EXTEN})
 same => n,Set(AGENT_NUM=$[${EXTEN} - 1000])
 same => n,Set(AGENT_NAME=agent${AGENT_NUM})
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(name)}-to-${AGENT_NAME}-${UNIQUEID}.${RECORD_FORMAT})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${AGENT_NAME},30,tTkK)
 same => n,StopMixMonitor()
 same => n,Set(CALL_DURATION=${CDR(billsec)})
 same => n,Set(CALL_STATUS=${DIALSTATUS})
 same => n,System(curl -s -X POST ${LARAVEL_API}/webhook/call-ended -H "Content-Type: application/json" -d '{"recording_file":"${RECORDING_FILE}","caller":"${CALLERID(name)}","callee":"${AGENT_NAME}","duration":"${CALL_DURATION}","status":"${CALL_STATUS}","uniqueid":"${UNIQUEID}"}' &)
 same => n,Hangup()

exten => _102[0-5],1,NoOp(Internal call to agent extension ${EXTEN})
 same => n,Set(AGENT_NUM=$[${EXTEN} - 1000])
 same => n,Set(AGENT_NAME=agent${AGENT_NUM})
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(name)}-to-${AGENT_NAME}-${UNIQUEID}.${RECORD_FORMAT})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${AGENT_NAME},30,tTkK)
 same => n,StopMixMonitor()
 same => n,Set(CALL_DURATION=${CDR(billsec)})
 same => n,Set(CALL_STATUS=${DIALSTATUS})
 same => n,System(curl -s -X POST ${LARAVEL_API}/webhook/call-ended -H "Content-Type: application/json" -d '{"recording_file":"${RECORDING_FILE}","caller":"${CALLERID(name)}","callee":"${AGENT_NAME}","duration":"${CALL_DURATION}","status":"${CALL_STATUS}","uniqueid":"${UNIQUEID}"}' &)
 same => n,Hangup()

; --- Outbound calls (external numbers) ---
; All outbound calls are recorded via MixMonitor
exten => _X.,1,NoOp(Outbound call from ${CALLERID(name)} to ${EXTEN})
 same => n,Set(RECORDING_FILE=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(name)}-to-${EXTEN}-${UNIQUEID}.${RECORD_FORMAT})
 same => n,MixMonitor(${RECORDING_FILE},b)
 same => n,Dial(PJSIP/${EXTEN}@trunk-out,60,tTkK)
 same => n,StopMixMonitor()
 same => n,Set(CALL_DURATION=${CDR(billsec)})
 same => n,Set(CALL_STATUS=${DIALSTATUS})
 same => n,System(curl -s -X POST ${LARAVEL_API}/webhook/call-ended -H "Content-Type: application/json" -d '{"recording_file":"${RECORDING_FILE}","caller":"${CALLERID(name)}","callee":"${EXTEN}","duration":"${CALL_DURATION}","status":"${CALL_STATUS}","uniqueid":"${UNIQUEID}"}' &)
 same => n,Hangup()

; --- Hangup handler ---
[call-center-hangup]
exten => s,1,NoOp(Call hangup handler)
 same => n,StopMixMonitor()
 same => n,Return()

; --- Echo test for testing ---
[call-center]
exten => 9999,1,NoOp(Echo Test)
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; --- Playback test ---
exten => 9998,1,NoOp(Playback Test)
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()
