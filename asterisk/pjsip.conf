; =============================================================================
; Asterisk 20 PJSIP Configuration - Call Center System
; =============================================================================

; --- Transport: UDP (standard SIP) ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; --- Transport: WebSocket (for Flutter/WebRTC clients) ---
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

; --- Transport: WSS (secure WebSocket - optional) ---
;[transport-wss]
;type=transport
;protocol=wss
;bind=0.0.0.0:8089

; =============================================================================
; Agent Template
; =============================================================================
[agent-template](!)
type=endpoint
context=call-center
disallow=all
allow=opus
allow=ulaw
allow=alaw
allow=g722
transport=transport-ws
webrtc=yes
dtls_auto_generate_cert=yes
media_encryption=dtls
media_encryption_optimistic=yes
use_avpf=yes
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
direct_media=no
send_pai=yes
trust_id_inbound=yes

[auth-template](!)
type=auth
auth_type=userpass

[aor-template](!)
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=30

; =============================================================================
; Agent 1
; =============================================================================
[agent1](agent-template)
auth=agent1-auth
aors=agent1
callerid="Agent 1" <1001>

[agent1-auth](auth-template)
username=agent1
password=AgentPass12024

[agent1](aor-template)

