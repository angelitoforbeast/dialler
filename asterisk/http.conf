; =============================================================================
; Asterisk HTTP Server Configuration
; Enables WebSocket connections for SIP over WS
; =============================================================================

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088
prefix=
enablestatic=yes

; TLS/HTTPS (optional - uncomment and configure for production)
;tlsenable=yes
;tlsbindaddr=0.0.0.0:8089
;tlscertfile=/etc/asterisk/keys/asterisk.pem
;tlsprivatekey=/etc/asterisk/keys/asterisk.key
